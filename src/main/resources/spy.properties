# P6Spy properties configuration
# This configures how the SQL queries are logged in the terminal.

# Specify the log message format. Custom formatter or standard multi-line.
logMessageFormat=com.p6spy.engine.spy.appender.MultiLineFormat

# Specify the appender to use for logging
appender=com.p6spy.engine.spy.appender.StdoutLogger

# Database driver list to wrap (p6spy wraps these dynamically)
driverlist=org.postgresql.Driver

# Date format for the log
dateformat=yyyy-MM-dd HH:mm:ss.SSS

# Execution threshold (in milliseconds) to log queries that take longer than this.
# Set to 0 to log all queries, or higher to only log slow queries.
executionThreshold=0

# Exclude certain queries from logging (e.g. metadata queries)
filter=false
# sqlite, h2, flyway metadata queries can be excluded if desired
